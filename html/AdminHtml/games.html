<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../css/other.css" />
    <title>GameMates | Admin Panel</title>
  </head>

  <body class="admin-body">
    <header>
      <h2 class="logo">GameMates</h2>
      <nav class="navigation">
        <a class="nav-link" href="../home.html">Home</a>
        <a class="nav-link" href="../eye.html">Eye Training</a>
        <a class="nav-link" href="../about.html">About Us</a>
        <a class="nav-link" href="../faqs.html">FAQs</a>
        <a href="../login.html">
          <button class="btnLogin-popup">Login</button>
        </a>
        <a href="../signup.html">
          <button class="btnLogin-popup">Signup</button>
        </a>
      </nav>
    </header>

    <div class="admin-panel">
      <div class="admin-sidebar">
        <h2>Admin Panel</h2>
        <ul>
          <li>
            <a href="admin.html" class="admin-link">Dashboard</a>
          </li>
          <li><a href="users.html" class="admin-link">Users</a></li>
          <li><a href="games.html" class="admin-active">Games</a></li>
          <li><a href="../home.html" class="admin-link">Logout</a></li>
        </ul>
      </div>

      <div class="admin-content">
        <h1 class="admin-games-heading">Games Management</h1>
        <table class="admin-games-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Rank</th>
              <th>Game Modes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>Dota 2</td>
              <td>Archon, Legend</td>
              <td>Ranked, Unranked</td>
              <td class="admin-games-table-action">
                <button class="admin-games-action">Edit</button>
                <button class="admin-games-delete">Delete</button>
              </td>
            </tr>
            <tr>
              <td>2</td>
              <td>Valorant</td>
              <td>Iron, Bronze, Silver, Platinum</td>
              <td>Unranked</td>
              <td class="admin-games-table-action">
                <button class="admin-games-action">Edit</button>
                <button class="admin-games-delete">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <script src="../../js/dashboard.js"></script>
  </body>
</html>
