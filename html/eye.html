        /* body {

        .fullscreen-text {
            font-size: 4em;
            color: white;
            /* position: absolute; */
            animation: moveAround 1s linear infinite;
        }

        @keyframes moveAround {
            0%, 100% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            10% {
                transform: translate(calc(50vw * var(--x)), calc(50vh * var(--y))) rotate(36deg);
            }
            20% {
                transform: translate(calc(50vw * var(--x)), calc(50vh * var(--y))) rotate(72deg);
            }
            30% {
                transform: translate(calc(50vw * var(--x)), calc(50vh * var(--y))) rotate(108deg);
            }
            40% {
                transform: translate(calc(50vw * var(--x)), calc(50vh * var(--y))) rotate(144deg);
            }
            50% {
                transform: translate(calc(50vw * var(--x)), calc(50vh * var(--y))) rotate(180deg);
            }
            60% {
                transform: translate(calc(50vw * var(--x)), calc(50vh * var(--y))) rotate(216deg);
            }
            70% {
                transform: translate(calc(50vw * var(--x)), calc(50vh * var(--y))) rotate(252deg);
            }
            80% {
                transform: translate(calc(50vw * var(--x)), calc(50vh * var(--y))) rotate(288deg);
            }
            90% {
                transform: translate(calc(50vw * var(--x)), calc(50vh * var(--y))) rotate(324deg);
            }
        }
    </style>
</head>

    <!-- сделать тулбар -->

    <div class="fullscreen-text" id="movingText">
        <p>🟤</p>
    </div>

    <script>
        const movingText = document.getElementById('movingText');

        function setRandomCoordinates() {
            const x = Math.random() * 2 - 1; // Random number between -1 and 1
            const y = Math.random() * 2 - 1; // Random number between -1 and 1
            movingText.style.setProperty('--x', x);
            movingText.style.setProperty('--y', y);
        }

        setRandomCoordinates(); // Set initial random coordinates

        movingText.addEventListener('animationiteration', setRandomCoordinates); // Change coordinates on each animation iteration
    </script>
