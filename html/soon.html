<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/games.css">
    <title>GameMates | Soon</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .fullscreen-text {
            font-size: 4em;
            color: white;
            position: absolute;
            animation: moveAround 0.1s linear infinite;
        }

        .moving-text {
            font-size: 2em;
            color: white;
            position: absolute;
            animation: moveText 2s linear infinite;
        }

        .changing-text {
            font-size: 100em;
            color: white;
            position: absolute;
            animation: changeSize 0.1s ease-in-out infinite alternate;
        }

        @keyframes moveAround {
            0%, 100% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            25% {
                transform: translate(calc(50vw * var(--x)), calc(50vh * var(--y))) rotate(180deg);
            }
            50% {
                transform: translate(calc(50vw * var(--x)), calc(50vh * var(--y))) rotate(360deg);
            }
            75% {
                transform: translate(calc(50vw * var(--x)), calc(50vh * var(--y))) rotate(540deg);
            }
        }

        @keyframes moveText {
            from {
                left: 100%;
            }
            to {
                left: -100%;
            }
        }

        @keyframes changeSize {
            from {
                font-size: 1em;
            }
            to {
                font-size: 3em;
            }
        }
    </style>
</head>

<body>
    <div class="fullscreen-text" id="movingText">
        <p>o</p>
    </div>
    <div class="moving-text">🚅🚃🚃🚃</div>
    <div class="changing-text">💩</div>

    <script>
        const movingText = document.getElementById('movingText');

        function setRandomCoordinates() {
            const x = Math.random() * 2 - 1; // Random number between -1 and 1
            const y = Math.random() * 2 - 1; // Random number between -1 and 1
            movingText.style.setProperty('--x', x);
            movingText.style.setProperty('--y', y);
        }

        setRandomCoordinates(); // Set initial random coordinates

        movingText.addEventListener('animationiteration', setRandomCoordinates); // Change coordinates on each animation iteration
    </script>
</body>

</html>
